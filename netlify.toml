[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

# ── Feed do podcast: URL pública limpa e estável (submetida ao Spotify) ───────
# Rewrite (status 200): o endereço permanece /podcast.xml para quem acessa,
# servido pela function podcast-rss (feed mestre). Se um dia a infra mudar, a
# URL registrada nos agregadores continua a mesma.
[[redirects]]
  from = "/podcast.xml"
  to = "/.netlify/functions/podcast-rss"
  status = 200

# ── Links curtos dos canais (ecossistema site ↔ Instagram ↔ Spotify) ─────────
# Todos os materiais (site, e-mail, bio do Instagram, descrição no Spotify)
# apontam para ESTES endereços — se o destino mudar, troca-se aqui, num lugar só.
[[redirects]]
  from = "/instagram"
  to = "https://www.instagram.com/odontofeedbr"
  status = 302

# TODO: trocar pelo link público do programa assim que o usuário o enviar
# (Spotify → programa OdontoFeed → Compartilhar → Copiar link:
# https://open.spotify.com/show/XXXXXXXX). Interino: busca pelo nome.
[[redirects]]
  from = "/spotify"
  to = "https://open.spotify.com/search/OdontoFeed"
  status = 302

[functions."cleanup-articles"]
  schedule = "0 3 * * 0"

# "O Que Ficou" — weekly top-articles recap: agendado via GitHub Actions
# (.github/workflows/weekly-digest.yml, sábado 11h UTC = 8h BRT) porque o envio
# percorre todos os usuários e não cabe no timeout de ~26s do Netlify.
# A função continua deployada apenas para disparo manual via HTTP.
[functions."weekly-digest"]
  node_bundler = "nft"

[functions."weekly-unsubscribe"]
  node_bundler = "nft"

