[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

[functions."cleanup-articles"]
  schedule = "0 3 * * 0"

# "O Que Ficou" — weekly top-articles recap: agendado via GitHub Actions
# (.github/workflows/weekly-digest.yml, sábado 11h UTC = 8h BRT) porque o envio
# percorre todos os usuários e não cabe no timeout de ~26s do Netlify.
# A função continua deployada apenas para disparo manual via HTTP.
[functions."weekly-digest"]
  node_bundler = "nft"

[functions."weekly-unsubscribe"]
  node_bundler = "nft"

# Tracking endpoints — must respond in < 10s (well within budget)
[functions."track-open"]
  node_bundler = "nft"

[functions."track-click"]
  node_bundler = "nft"

[functions."get-trending"]
  node_bundler = "nft"

# Recommendation & personalization endpoints
[functions."get-recommendations"]
  node_bundler = "nft"

[functions."get-trending-personalized"]
  node_bundler = "nft"

# Contextual Intelligence Layer (FASE 6)
[functions."get-article-context"]
  node_bundler = "nft"

[functions."save-workspace-item"]
  node_bundler = "nft"

[functions."get-workspace"]
  node_bundler = "nft"

[functions."get-learning-timeline"]
  node_bundler = "nft"

[functions."get-daily-briefing"]
  node_bundler = "nft"

# Knowledge Memory System (FASE 5)
[functions."save-note"]
  node_bundler = "nft"

[functions."search-knowledge"]
  node_bundler = "nft"

[functions."get-knowledge-graph"]
  node_bundler = "nft"

[functions."get-memory-review"]
  node_bundler = "nft"

[functions."create-collection"]
  node_bundler = "nft"

# Clinical Intelligence Layer (FASE 4)
[functions."get-consensus"]
  node_bundler = "nft"

[functions."compare-studies"]
  node_bundler = "nft"

[functions."ask-clinical-question"]
  node_bundler = "nft"

[functions."get-guideline-alerts"]
  node_bundler = "nft"

# Analytics & Admin endpoints
[functions."get-feature-analytics"]
  node_bundler = "nft"

# Scientific Intelligence Dashboard (FASE 3)
[functions."get-scientific-profile"]
  node_bundler = "nft"

[functions."get-trend-intelligence"]
  node_bundler = "nft"

[functions."get-weekly-report"]
  node_bundler = "nft"

[functions."get-learning-paths"]
  node_bundler = "nft"

# Ingestion pipeline runs via GitHub Actions (daily-ingest.yml) rather than
# Netlify scheduled functions because the pipeline needs > 10s timeout.
# The functions below can still be triggered manually via HTTP if needed.
[functions."ingest-pubmed"]
  node_bundler = "nft"

[functions."ingest-europepmc"]
  node_bundler = "nft"

[functions."ingest-openalex"]
  node_bundler = "nft"

[functions."process-article"]
  node_bundler = "nft"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options      = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy      = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy   = "geolocation=(), microphone=(), camera=(), payment=()"
    # CSP: o app usa JS inline e handlers onclick, por isso script-src precisa de 'unsafe-inline'.
    # A proteção-chave é connect-src 'self': mesmo um XSS não consegue exfiltrar o token de sessão
    # para um host externo via fetch/XHR/WebSocket/beacon. Fontes do Google são liberadas para CSS/fontes.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
