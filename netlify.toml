[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

[functions."daily-articles"]
  schedule = "0 10 * * *"

[functions."cleanup-articles"]
  schedule = "0 3 * * 0"

# Tracking endpoints — must respond in < 10s (well within budget)
[functions."track-open"]
  node_bundler = "nft"

[functions."track-click"]
  node_bundler = "nft"

[functions."get-trending"]
  node_bundler = "nft"

# Recommendation & personalization endpoints
[functions."get-recommendations"]
  node_bundler = "nft"

[functions."get-trending-personalized"]
  node_bundler = "nft"

# Knowledge Memory System (FASE 5)
[functions."save-note"]
  node_bundler = "nft"

[functions."search-knowledge"]
  node_bundler = "nft"

[functions."get-knowledge-graph"]
  node_bundler = "nft"

[functions."get-memory-review"]
  node_bundler = "nft"

[functions."create-collection"]
  node_bundler = "nft"

# Clinical Intelligence Layer (FASE 4)
[functions."get-consensus"]
  node_bundler = "nft"

[functions."compare-studies"]
  node_bundler = "nft"

[functions."ask-clinical-question"]
  node_bundler = "nft"

[functions."get-guideline-alerts"]
  node_bundler = "nft"

# Scientific Intelligence Dashboard (FASE 3)
[functions."get-scientific-profile"]
  node_bundler = "nft"

[functions."get-trend-intelligence"]
  node_bundler = "nft"

[functions."get-weekly-report"]
  node_bundler = "nft"

[functions."get-learning-paths"]
  node_bundler = "nft"

# Ingestion pipeline runs via GitHub Actions (daily-ingest.yml) rather than
# Netlify scheduled functions because the pipeline needs > 10s timeout.
# The functions below can still be triggered manually via HTTP if needed.
[functions."ingest-pubmed"]
  node_bundler = "nft"

[functions."ingest-europepmc"]
  node_bundler = "nft"

[functions."ingest-openalex"]
  node_bundler = "nft"

[functions."process-article"]
  node_bundler = "nft"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options      = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy      = "strict-origin-when-cross-origin"
