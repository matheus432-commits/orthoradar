# ── Cache ────────────────────────────────────────────────────────────────────
# HTML e o próprio service worker NUNCA podem ficar velhos no navegador — cada
# deploy precisa aparecer imediatamente (sem "página antiga que depois vira a
# nova"). Ícones podem cachear por 7 dias.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options      = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy      = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy   = "geolocation=(), microphone=(), camera=(), payment=()"
    # CSP: o app usa JS inline e handlers onclick, por isso script-src precisa de 'unsafe-inline'.
    # A proteção-chave é connect-src 'self': mesmo um XSS não consegue exfiltrar o token de sessão
    # para um host externo via fetch/XHR/WebSocket/beacon. Fontes do Google são liberadas para CSS/fontes.
    # media-src: os áudios do podcast são servidos DIRETO do Firebase Storage
    # (fora do Netlify, por banda) — sem esta diretiva o default-src 'self'
    # bloqueia o <audio> e o player fica mudo (0:00/0:00).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self' https://firebasestorage.googleapis.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
