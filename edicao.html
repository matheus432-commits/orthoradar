<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Sua edição de hoje — OdontoFeed</title>
<style>
  :root{
    --text:#1A1A18;--text-2:#6B665E;--muted:#9E988E;--accent:#B08968;--accent-dark:#96714F;
    --bg:#EDE8DF;--paper:#FDFAF5;--card:#F8F3EA;--line:#E8E0D0;--gold:#C9A227;
    --pro:#5A3B96;--pro-bg:#EAE4F4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;line-height:1.65;}
  header{background:#1A1A18;padding:14px 20px;position:sticky;top:0;z-index:10;}
  .hd{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .logo{color:#FDFAF5;font-family:Georgia,serif;font-size:20px;font-weight:700;text-decoration:none;}
  .logo em{color:var(--accent);font-style:normal;}
  .user-chip{display:flex;align-items:center;gap:10px;color:#B5B0A8;font-size:12.5px;}
  .plan-badge{font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 8px;border-radius:100px;text-transform:uppercase;}
  .plan-badge.pro{background:var(--pro);color:#fff;}
  .plan-badge.free{background:#3A3A36;color:#B5B0A8;border:1px solid #55524C;}
  main{max-width:820px;margin:0 auto;padding:28px 16px 64px;}

  .state{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:40px 28px;text-align:center;color:var(--text-2);}
  .state h2{font-family:Georgia,serif;font-size:20px;color:var(--text);margin-bottom:8px;}
  .state a{color:var(--accent);}

  .ed-head{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:26px 28px;margin-bottom:18px;}
  .kicker{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  h1{font-family:Georgia,serif;font-size:26px;letter-spacing:-0.3px;margin-bottom:4px;}
  .ed-date{color:var(--muted);font-size:13px;margin-bottom:14px;}
  .editorial{border-left:3px solid var(--accent);background:var(--card);padding:14px 18px;border-radius:0 4px 4px 0;font-family:Georgia,serif;font-style:italic;color:var(--text-2);font-size:14.5px;}

  /* Áudio da edição (Pro) / upgrade (demais) */
  .audio-card{border-radius:6px;padding:20px 24px;margin-bottom:18px;}
  .audio-card.pro-on{background:var(--pro-bg);border:1px solid #C2B5E2;}
  .audio-card.pro-wait{background:var(--card);border:1px dashed #C8C2B8;color:var(--muted);font-size:13.5px;}
  .audio-card.upgrade{background:linear-gradient(120deg,#2A2440,#4A2F80);color:#EDE8F8;}
  .audio-card.upgrade h3{font-family:Georgia,serif;font-size:17px;color:#fff;margin-bottom:4px;}
  .audio-card.upgrade p{font-size:13px;color:#C9BFE2;margin-bottom:12px;}
  .audio-title{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--pro);margin-bottom:10px;}
  .player{display:none;align-items:center;gap:12px;margin-top:14px;background:var(--pro-bg);border:1px solid #C2B5E2;border-radius:4px;padding:12px 16px;}
  .player.open{display:flex;}
  .btn-audio{background:var(--pro);color:#fff;}
  .btn-audio:hover{background:#4A2F80;}
  .resumo-full{margin-bottom:12px;border:1px solid var(--line);border-radius:4px;background:var(--paper);}
  .resumo-full p{padding:0 16px 14px;font-size:14px;color:var(--text-2);line-height:1.75;}
  /* Painel do resumo estruturado (botão "Ler o resumo") */
  .rc-panel{margin:14px 0 0;padding-top:4px;border-left:3px solid var(--accent);}
  .rc-panel[hidden]{display:none;}
  .rc-head{padding:12px 16px 4px;font-size:10.5px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent-dark);}
  .btn-resumo{background:var(--paper);color:var(--accent-dark);border:1.5px solid var(--accent-dark);}
  .btn-resumo:hover{background:#F5EFE3;}
  .ad-card{background:var(--paper);border:1px dashed #C8C2B8;border-radius:6px;padding:14px 18px;margin-bottom:16px;}
  .ad-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .pp{width:42px;height:42px;border-radius:50%;background:var(--pro);color:#fff;border:none;font-size:15px;cursor:pointer;flex-shrink:0;}
  .track{flex:1;}
  .bar{height:5px;background:#D5CBE8;border-radius:3px;overflow:hidden;cursor:pointer;}
  .fill{height:100%;width:0%;background:var(--pro);border-radius:3px;}
  .times{display:flex;justify-content:space-between;font-size:10.5px;color:var(--pro);margin-top:4px;font-variant-numeric:tabular-nums;}
  .speed{font-size:11px;font-weight:700;color:var(--pro);background:none;border:1px solid #C2B5E2;border-radius:3px;padding:4px 8px;cursor:pointer;}
  .btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:10px 18px;border-radius:4px;text-decoration:none;border:none;cursor:pointer;}
  .btn-upgrade{background:var(--gold);color:#1A1A18;font-weight:800;}
  .btn-read{background:#1A1A18;color:#FDFAF5;}
  .btn-read:hover{background:#33322E;}

  .art{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:24px 28px;margin-bottom:16px;}
  .art.achado{border:1px solid var(--gold);}
  .achado-flag{display:inline-block;background:var(--gold);color:#fff;font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:3px 10px;border-radius:3px;margin-bottom:10px;}
  .art-kicker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .esp-tag{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);}
  .ev-badge{font-size:10px;font-weight:700;padding:2px 10px;border-radius:100px;background:var(--pro-bg);color:var(--pro);border:1px solid #C2B5E2;}
  .read-min{font-size:11px;color:var(--muted);}
  .art h2{font-family:Georgia,serif;font-size:20px;line-height:1.35;margin-bottom:12px;}
  .resumo-destaque{border-left:3px solid var(--gold);background:#FBF7EC;padding:14px 18px;border-radius:0 4px 4px 0;margin-bottom:12px;}
  .resumo-destaque .rlabel{font-size:9.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-dark);margin-bottom:5px;}
  .resumo-destaque p{color:var(--text-2);font-size:14px;}
  .impacto{font-size:13.5px;color:var(--text-2);margin-bottom:16px;}
  .impacto strong{color:var(--text);}
  .meta-src{font-size:11.5px;color:var(--muted);margin-bottom:14px;}
  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

  footer{border-top:1px solid var(--line);padding:22px 16px;max-width:820px;margin:0 auto;}
  footer p{font-size:10.5px;color:var(--muted);line-height:1.7;}
  footer a{color:var(--accent);}

  @media (max-width:560px){
    main{padding:18px 10px 48px;}
    .ed-head,.art,.audio-card{padding:18px 16px;}
    h1{font-size:21px;}
    .art h2{font-size:17.5px;}
    .actions{flex-direction:column;align-items:stretch;}
    .btn{justify-content:center;}
    .user-chip .uname{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="hd">
    <a class="logo" href="/">OdontoFeed<em>.</em></a>
    <div class="user-chip" id="userChip" style="display:none;">
      <span class="plan-badge" id="badgePlan"></span>
      <span class="uname" id="userName"></span>
    </div>
  </div>
</header>

<main id="main">
  <div class="state" id="loading"><h2>Carregando sua edição…</h2><p>Um instante.</p></div>
</main>

<footer>
  <p>Os resumos e áudios são gerados por IA com validação automatizada e não substituem a leitura do
  artigo original nem orientação clínica individualizada. Decisões clínicas são de responsabilidade
  do profissional. · <a href="/dashboard.html">Painel</a> · <a href="/privacidade.html">Privacidade</a> · <a href="/termos.html">Termos</a></p>
</footer>

<script>
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmt(s){if(!isFinite(s)||s<0)return '–:––';s=Math.floor(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function fmtDate(iso){
  try{const [y,m,d]=iso.split('-');return new Date(Date.UTC(+y,+m-1,+d)).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'UTC'});}
  catch(e){return iso;}
}

function showError(title, msg){
  document.getElementById('main').innerHTML =
    '<div class="state"><h2>'+esc(title)+'</h2><p>'+msg+'</p></div>';
}

// Episódio de áudio correspondente ao artigo — SOMENTE por id do artigo.
// (O antigo fallback por posição mostrava o áudio de UM artigo em OUTRO
// quando a edição e os episódios não estavam alinhados. Sem match = sem áudio.)
function episodeFor(podcast, artigo){
  if (!podcast || !podcast.episodios) return null;
  return podcast.episodios.find(e => e.artigoId && artigo.id && String(e.artigoId) === String(artigo.id)) || null;
}

function playerHtml(pid){
  return '<div class="player" id="player-'+pid+'">'
    + '<button class="pp">▶</button>'
    + '<div class="track"><div class="bar"><div class="fill"></div></div>'
    + '<div class="times"><span class="cur">0:00</span><span class="dur">–:––</span></div></div>'
    + '<button class="speed">1×</button>'
    + '</div>';
}

// Resumo estruturado (Objetivo / Materiais e métodos / Resultados / Relevância
// clínica) — painel aberto pelo botão "Ler o resumo" ao lado do áudio. Títulos
// de seção reconhecidos viram cabeçalhos; resumos antigos em prosa renderizam
// como parágrafos normais (compatibilidade até a regeneração pelo digest).
const RC_HEAD = /^(objetivo|materiais? e m[ée]todos?|m[ée]todos?|metodologia|resultados?|relev[âa]ncia cl[íi]nica|import[âa]ncia( cl[íi]nica)?|limita[çc][õo]es)\s*:?\s*$/i;
function resumoPanelHtml(texto, pid){
  if (!texto) return '';
  const corpo = texto.split(/\n+/).map(function(l){
    l = l.trim();
    if (!l) return '';
    return RC_HEAD.test(l)
      ? '<div class="rc-head">'+esc(l.replace(/\s*:\s*$/,''))+'</div>'
      : '<p>'+esc(l)+'</p>';
  }).join('');
  return '<div class="resumo-full rc-panel" id="resumo-'+pid+'" hidden>'+corpo+'</div>';
}

function articleCard(a, isPremiumExtra, ep, idx){
  const pid = 'a' + idx;
  return '<article class="art'+(isPremiumExtra?' achado':'')+'">'
    + (isPremiumExtra ? '<span class="achado-flag">★ Exclusivo assinante</span>' : '')
    + '<div class="art-kicker">'
    +   '<span class="esp-tag">'+esc(a.especialidade||'')+'</span>'
    +   (a.nivel_evidencia ? '<span class="ev-badge">'+esc(a.nivel_evidencia)+'</span>' : '')
    +   '<span class="read-min">☕ '+esc(a.tempo_leitura||3)+' min'+(ep?' · 🎧 áudio disponível':'')+'</span>'
    + '</div>'
    + '<h2>'+esc(a.titulo)+'</h2>'
    + (a.resumo ? '<div class="resumo-destaque"><div class="rlabel">O essencial</div><p>'+esc(a.resumo)+'</p></div>' : '')
    + (a.impacto ? '<p class="impacto"><strong>Na sua prática:</strong> '+esc(a.impacto)+'</p>' : '')
    + ((a.journal||a.year) ? '<p class="meta-src">'+esc(a.journal||'')+(a.year?' · '+esc(a.year):'')+'</p>' : '')
    + '<div class="actions">'
    +   (ep ? '<button class="btn btn-audio" data-player="'+pid+'">▶ Ouvir este artigo</button>' : '')
    +   (a.resumo_completo ? '<button class="btn btn-resumo" data-resumo="'+pid+'">📄 Ler o resumo</button>' : '')
    +   '<a class="btn btn-read" href="'+esc(a.url)+'" target="_blank" rel="noopener">Ler o artigo original ↗</a>'
    + '</div>'
    + (ep ? playerHtml(pid) + '<audio id="audio-'+pid+'" preload="none" src="'+esc(ep.url)+'"></audio>' : '')
    + resumoPanelHtml(a.resumo_completo, pid)
    + '</article>';
}

// Anúncio contextual (plano Gratuito) — sempre identificado como publicidade
function adSection(anuncio){
  if (!anuncio || (!anuncio.texto && !anuncio.imagemUrl)) return '';
  const inner = (anuncio.imagemUrl ? '<img src="'+esc(anuncio.imagemUrl)+'" alt="'+esc(anuncio.patrocinador)+'" style="max-width:100%;border-radius:4px;margin-bottom:8px;"/>' : '')
    + (anuncio.texto ? '<p style="margin:0;font-size:13.5px;color:var(--text-2);">'+esc(anuncio.texto)+'</p>' : '');
  const body = anuncio.linkUrl ? '<a href="'+esc(anuncio.linkUrl)+'" target="_blank" rel="noopener sponsored" style="text-decoration:none;">'+inner+'</a>' : inner;
  return '<div class="ad-card"><div class="ad-label">Publicidade · '+esc(anuncio.patrocinador||'parceiro')+'</div>'+body+'</div>';
}

// Upsell Premium — inteligência, não conteúdo (o conteúdo é grátis)
function premiumSection(data){
  if (data.user.isPremium) return '';
  const preco = (data.premiumPreco || 59.90).toFixed(2).replace('.', ',');
  return '<div class="audio-card upgrade">'
    + '<h3>🧠 Construa seu segundo cérebro científico</h3>'
    + '<p>No Premium (R$ '+preco+'/mês), tudo que você lê e ouve vira uma biblioteca inteligente: salve artigos e podcasts, '
    + 'crie notas, escolha seus temas favoritos e pergunte à <strong>Wakai</strong> — sua IA pessoal que responde com base no que VOCÊ já estudou. Sem publicidade.</p>'
    + '<a class="btn btn-upgrade" href="/#planos">Conhecer o Premium →</a>'
    + '</div>';
}

function wireResumos(){
  document.querySelectorAll('.btn-resumo').forEach(btn => {
    const panel = document.getElementById('resumo-'+btn.dataset.resumo);
    if (!panel) return;
    btn.onclick = () => {
      panel.hidden = !panel.hidden;
      btn.textContent = panel.hidden ? '📄 Ler o resumo' : '📄 Fechar resumo';
      if (!panel.hidden) panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
    };
  });
}

function wirePlayers(){
  const speeds = [1, 1.25, 1.5, 2];
  document.querySelectorAll('.btn-audio').forEach(btn => {
    const pid = btn.dataset.player;
    const p = document.getElementById('player-'+pid);
    const audio = document.getElementById('audio-'+pid);
    if (!p || !audio) return;
    const pp = p.querySelector('.pp'), fill = p.querySelector('.fill');
    const cur = p.querySelector('.cur'), dur = p.querySelector('.dur');
    const bar = p.querySelector('.bar'), spd = p.querySelector('.speed');
    let si = 0;
    audio.addEventListener('loadedmetadata', () => { dur.textContent = fmt(audio.duration); });
    audio.addEventListener('timeupdate', () => {
      cur.textContent = fmt(audio.currentTime);
      if (audio.duration) fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    });
    audio.addEventListener('ended', () => { pp.textContent = '▶'; });
    const toggle = () => {
      if (audio.paused) {
        // pausa qualquer outro áudio tocando
        document.querySelectorAll('audio').forEach(a => { if (a !== audio) a.pause(); });
        document.querySelectorAll('.player .pp').forEach(b => { if (b !== pp) b.textContent = '▶'; });
        p.classList.add('open'); audio.play(); pp.textContent = '⏸';
      } else { audio.pause(); pp.textContent = '▶'; }
    };
    btn.onclick = toggle;
    pp.onclick = toggle;
    bar.onclick = (ev) => {
      if (!audio.duration) return;
      const r = bar.getBoundingClientRect();
      audio.currentTime = ((ev.clientX - r.left) / r.width) * audio.duration;
    };
    spd.onclick = () => { si = (si + 1) % speeds.length; audio.playbackRate = speeds[si]; spd.textContent = speeds[si] + '×'; };
  });
}

function render(data){
  const u = data.user, ed = data.edicao;
  document.getElementById('userChip').style.display = 'flex';
  document.getElementById('userName').textContent = u.nome + ' · ' + u.especialidade;
  const badge = document.getElementById('badgePlan');
  badge.textContent = u.isPremium ? '★ PREMIUM' : 'ASSINANTE';
  badge.className = 'plan-badge ' + (u.isPremium ? 'pro' : 'free');

  let html = '<div class="ed-head">'
    + '<div class="kicker">Sua edição diária · '+esc(u.especialidade)+'</div>'
    + '<h1>Olá, '+esc(u.nome)+' — os estudos de hoje</h1>'
    + '<div class="ed-date">'+esc(fmtDate(ed.date))+'</div>'
    + (ed.editorial ? '<div class="editorial">'+esc(ed.editorial)+'</div>' : '')
    + '</div>';

  html += adSection(data.anuncio);

  let idx = 0;
  // (Achado da Semana: função cancelada em 07/2026 — não é mais renderizado.)
  (ed.artigos || []).forEach((a) => {
    html += articleCard({ ...a, especialidade: u.especialidade }, false, episodeFor(data.podcast, a), idx++);
  });

  // Extras Premium do dia (2 artigos pelas preferências de tema do assinante) —
  // os mesmos que vão no e-mail; sem áudio por design (áudio é dos 3 da edição).
  (ed.premiumExtras || []).forEach((a) => {
    html += articleCard({ ...a, especialidade: u.especialidade }, true, null, idx++);
  });

  html += premiumSection(data);

  document.getElementById('main').innerHTML = html;
  wirePlayers();
  wireResumos();
}

(async function init(){
  const params = new URLSearchParams(location.search);
  const e = params.get('e'), t = params.get('t');
  let url, opts = {};

  if (e && t) {
    url = '/.netlify/functions/get-edicao?e=' + encodeURIComponent(e) + '&t=' + encodeURIComponent(t);
  } else {
    const email = localStorage.getItem('of_email'), token = localStorage.getItem('of_token');
    if (!email || !token) {
      showError('Acesso restrito a assinantes',
        'Abra a edição pelo botão do seu e-mail diário, ou <a href="/dashboard.html">entre na sua conta</a>. '
        + 'Ainda não é assinante? <a href="/#cadastro">Cadastre-se grátis</a>.');
      return;
    }
    url = '/.netlify/functions/get-edicao?email=' + encodeURIComponent(email);
    opts = { headers: { Authorization: 'Bearer ' + token } };
  }

  try {
    const res = await fetch(url, opts);
    const data = await res.json();
    if (!res.ok) {
      if (data.error === 'sem_edicao') showError('A edição de hoje está a caminho', esc(data.message||'') + ' <br/>Volte em alguns minutos.');
      else showError('Não foi possível abrir sua edição', esc(data.message || 'Tente pelo botão do seu e-mail mais recente, ou ')+'<a href="/dashboard.html">entre na sua conta</a>.');
      return;
    }
    render(data);
  } catch (err) {
    showError('Erro de conexão', 'Verifique sua internet e recarregue a página.');
  }
})();
</script>
</body>
</html>
