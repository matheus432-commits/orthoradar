services:

  db:
    image: postgres:16-alpine
    container_name: orthofollow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ortho
      POSTGRES_PASSWORD: orthofollow2024
      POSTGRES_DB: orthofollow
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ortho -d orthofollow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orthofollow-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ortho:orthofollow2024@db:5432/orthofollow
      PORT: 3000
      NODE_ENV: production
      WEB_ROOT: /app/apps/web
    ports:
      - "3000:3000"

volumes:
  pg_data:
