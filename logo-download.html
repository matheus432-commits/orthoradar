<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baixar Logo OdontoFeed em JPEG</title>
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    text-align: center;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    color: #333;
    margin-bottom: 10px;
  }
  .subtitle {
    color: #999;
    margin-bottom: 40px;
  }
  canvas {
    display: block;
    margin: 40px auto;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: white;
    max-width: 100%;
  }
  .buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
  }
  button {
    padding: 12px 30px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary {
    background: #0099cc;
    color: white;
  }
  .btn-primary:hover {
    background: #0077aa;
  }
  .btn-secondary {
    background: #f5f5f5;
    color: #333;
    border: 2px solid #ddd;
  }
  .btn-secondary:hover {
    background: #eee;
  }
  .info {
    background: #f0f8ff;
    padding: 20px;
    border-radius: 8px;
    margin-top: 40px;
    color: #333;
    text-align: left;
    font-size: 13px;
    line-height: 1.6;
  }
  .info strong {
    color: #0099cc;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎵 Logo OdontoFeed</h1>
  <p class="subtitle">Versão para Spotify em alta qualidade</p>

  <canvas id="logoDark" width="1200" height="500"></canvas>

  <div class="buttons">
    <button class="btn-primary" onclick="downloadImage('logoDark', 'OdontoFeed-Logo-Dark.jpg')">
      ⬇️ Baixar JPEG (Escuro)
    </button>
    <button class="btn-secondary" onclick="downloadImage('logoDark', 'OdontoFeed-Logo-Dark.png')">
      ⬇️ Baixar PNG
    </button>
    <button class="btn-secondary" onclick="copyToClipboard('logoDark')">
      📋 Copiar para Área de Transferência
    </button>
  </div>

  <div class="info">
    <strong>ℹ️ Informações:</strong>
    <ul style="margin: 10px 0; padding-left: 20px;">
      <li>Resolução: 1200×500px (alta qualidade)</li>
      <li>Formato: JPEG otimizado para web</li>
      <li>Uso: Upload direto no Spotify Artists</li>
      <li>Tamanho recomendado no Spotify: mínimo 500×500px</li>
    </ul>
  </div>
</div>

<script>
function drawLogo(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');

  // Fundo
  ctx.fillStyle = '#0f1419';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Arredondar cantos
  const borderRadius = 30;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0f1419';
  ctx.beginPath();
  ctx.moveTo(borderRadius, 0);
  ctx.lineTo(canvas.width - borderRadius, 0);
  ctx.arcTo(canvas.width, 0, canvas.width, borderRadius, borderRadius);
  ctx.lineTo(canvas.width, canvas.height - borderRadius);
  ctx.arcTo(canvas.width, canvas.height, canvas.width - borderRadius, canvas.height, borderRadius);
  ctx.lineTo(borderRadius, canvas.height);
  ctx.arcTo(0, canvas.height, 0, canvas.height - borderRadius, borderRadius);
  ctx.lineTo(0, borderRadius);
  ctx.arcTo(0, 0, borderRadius, 0, borderRadius);
  ctx.closePath();
  ctx.fill();

  // Texto "Odonto"
  ctx.font = 'bold 180px system-ui, -apple-system, sans-serif';
  ctx.fillStyle = '#00d4ff';
  ctx.textBaseline = 'middle';
  ctx.fillText('Odonto', 80, 250);

  // Texto "Feed"
  ctx.fillStyle = '#0099cc';
  ctx.fillText('Feed', 880, 250);

  // Ponto (.)
  ctx.font = 'bold 100px system-ui, -apple-system, sans-serif';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('.', 1120, 240);

  // Ícone RSS (ondas)
  const rssX = 1050;
  const rssY = 120;
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';

  // Círculo central
  ctx.beginPath();
  ctx.arc(rssX, rssY, 25, 0, Math.PI * 2);
  ctx.stroke();

  // Onda 1
  ctx.beginPath();
  ctx.arc(rssX, rssY, 50, -Math.PI * 0.4, -Math.PI * 0.6, true);
  ctx.stroke();

  // Onda 2
  ctx.beginPath();
  ctx.arc(rssX, rssY, 75, -Math.PI * 0.35, -Math.PI * 0.65, true);
  ctx.stroke();

  // Tagline
  ctx.font = '32px system-ui, -apple-system, sans-serif';
  ctx.fillStyle = '#7a9ca5';
  ctx.textBaseline = 'top';
  ctx.letterSpacing = '8px';
  ctx.fillText('CIÊNCIA ODONTOLÓGICA DIÁRIA', 80, 380);
}

function downloadImage(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');

  if (filename.endsWith('.jpg') || filename.endsWith('.jpeg')) {
    link.href = canvas.toDataURL('image/jpeg', 0.95);
  } else {
    link.href = canvas.toDataURL('image/png');
  }

  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function copyToClipboard(canvasId) {
  const canvas = document.getElementById(canvasId);
  canvas.toBlob(blob => {
    navigator.clipboard.write([
      new ClipboardItem({ 'image/png': blob })
    ]).then(() => {
      alert('✓ Logo copiado para área de transferência!\n\nVocê pode colar diretamente no Spotify.');
    });
  });
}

// Desenhar logo ao carregar
window.addEventListener('load', () => {
  drawLogo('logoDark');
});
</script>
</body>
</html>
