<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Página não encontrada – OdontoFeed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0b1120;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;text-align:center;}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#0ea5e9,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:inline-block;margin-bottom:48px;}
.code{font-size:7rem;font-weight:800;background:linear-gradient(135deg,#0ea5e9,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:16px;}
h1{font-size:1.5rem;font-weight:700;margin-bottom:12px;}
p{color:#94a3b8;font-size:1rem;line-height:1.6;max-width:380px;margin-bottom:36px;}
.btn{display:inline-block;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;text-decoration:none;padding:13px 32px;border-radius:10px;font-weight:700;font-size:0.95rem;transition:opacity 0.2s;}
.btn:hover{opacity:0.85;}
</style>
</head>
<body>
  <a class="logo" href="/">OdontoFeed</a>
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>O endereço que você acessou não existe ou foi movido. Verifique o link ou volte para a página inicial.</p>
  <a class="btn" href="/">← Voltar para o início</a>
</body>
</html>
