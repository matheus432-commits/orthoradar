# Diagnóstico do feed mestre do podcast (o que o Spotify enxerga).
# Dispara em push no script; só lê e imprime — não publica nada.
name: Feed Probe (podcast)

on:
  push:
    branches: [main]
    paths:
      - 'scripts/feed-probe.js'
      - '.github/workflows/feed-probe.yml'
  workflow_dispatch:

jobs:
  probe:
    name: Inspecionar feed mestre
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rodar sondagem do feed
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: node scripts/feed-probe.js
