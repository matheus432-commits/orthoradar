name: OdontoFeed Daily Pipeline

# Pipeline completo: ingestão → enriquecimento → perfis → envio de emails.
#
# Triggers:
#   schedule   — 10:00 UTC (07:00 BRT): executa o pipeline completo todo dia.
#   push       — qualquer push em netlify/functions/** para main:
#                executa apenas ingestão (nunca email), garantindo artigos
#                frescos sem risco de duplo envio.
#   workflow_dispatch — disparo manual com opções force_send / skip_ai / email_only.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 10 * * *'

  push:
    branches: [main]
    paths:
      - 'netlify/functions/**'
      - '.github/workflows/daily-pipeline.yml'

  workflow_dispatch:
    inputs:
      force_send:
        description: 'Forçar envio para todos (ignorar fadiga)'
        required: false
        default: 'false'
        type: boolean
      skip_ai:
        description: 'Pular enriquecimento com Claude'
        required: false
        default: 'false'
        type: boolean
      email_only:
        description: 'Apenas enviar emails (pular ingestão)'
        required: false
        default: 'false'
        type: boolean

# ── Job 1: Ingestão e Enriquecimento ─────────────────────────────────────────
jobs:
  ingest:
    name: Ingestão e Enriquecimento
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Pula ingestão quando email_only=true (disparo manual só de email)
    if: github.event.inputs.email_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ingest PubMed
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          NCBI_API_KEY:        ${{ secrets.NCBI_API_KEY }}
        run: node netlify/functions/ingest-pubmed.js

      - name: Ingest Europe PMC
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/ingest-europepmc.js

      - name: Ingest OpenAlex
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/ingest-openalex.js

      - name: Enriquecimento com Claude Haiku
        if: github.event.inputs.skip_ai != 'true'
        # continue-on-error: falha de AI não cancela a ingestão nem o email
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          AI_BATCH_SIZE:       '20'
        run: node netlify/functions/process-article.js

      - name: Corrigir artigos sem journal
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/fix-missing-journals.js

      - name: Atualizar perfis comportamentais
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/update-user-profile.js

# ── Job 2: Envio de Emails ────────────────────────────────────────────────────
  email:
    name: Envio de Digests
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Executa email se:
    #   A) ingest terminou (com sucesso OU falha — ainda há artigos no Firestore)
    #      exceto se foi cancelado pelo usuário.
    #   B) E o evento NÃO é push de código (push só atualiza artigos, nunca envia email).
    if: >-
      always() &&
      needs.ingest.result != 'cancelled' &&
      github.event_name != 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Disparar digests
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY:        ${{ secrets.NCBI_API_KEY }}
          UNSUBSCRIBE_SECRET:  ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL:            https://odontofeed.com.br
          FORCE_SEND:          ${{ github.event.inputs.force_send || 'false' }}
        run: node netlify/functions/daily-digest.js
