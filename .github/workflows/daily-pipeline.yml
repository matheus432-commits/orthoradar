name: OdontoFeed Daily Pipeline

# Pipeline completo: ingestão → enriquecimento → perfis → envio de emails.
#
# Triggers (diretriz 22/07 — controle de custos):
#   schedule   — 03:00 UTC (00:00 BRT): a ÚNICA execução automática. Ingestão +
#                enriquecimento + envio roda de madrugada, então o dentista
#                acorda com o digest no inbox. Esta é a única cobrança de
#                créditos "automática" esperada por dia.
#   workflow_dispatch — disparo manual (force_send / skip_ai / email_only).
#
# NÃO existe mais gatilho por PUSH. Publicar código (deploy) NÃO re-executa o
# pipeline: antes, qualquer push em netlify/functions/** re-rodava ingestão +
# enriquecimento com Claude, consumindo créditos a cada deploy durante o dia.
# O site no Netlify continua publicando normalmente (deploy independente do
# GitHub Actions); o pipeline só roda à meia-noite ou por disparo manual.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      force_send:
        description: 'Forçar envio para todos (ignorar fadiga)'
        required: false
        default: 'false'
        type: boolean
      skip_ai:
        description: 'Pular enriquecimento com Claude'
        required: false
        default: 'false'
        type: boolean
      email_only:
        description: 'Apenas enviar emails (pular ingestão)'
        required: false
        default: 'false'
        type: boolean

# ── Job 1: Ingestão e Enriquecimento ─────────────────────────────────────────
jobs:
  ingest:
    name: Ingestão e Enriquecimento
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Pula ingestão quando email_only=true (disparo manual só de email)
    if: github.event.inputs.email_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ingest PubMed
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NCBI_API_KEY:        ${{ secrets.NCBI_API_KEY }}
        run: node netlify/functions/ingest-pubmed.js

      - name: Ingest Europe PMC
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node netlify/functions/ingest-europepmc.js

      - name: Ingest OpenAlex
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node netlify/functions/ingest-openalex.js

      - name: Enriquecimento com Claude Haiku
        if: github.event.inputs.skip_ai != 'true'
        # continue-on-error: falha de AI não cancela a ingestão nem o email
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          # 3 artigos/dia × 12 especialidades = 36 + margem (reclassificação,
          # Achado da Semana, dias de ingestão fraca) → cobre todas as especialidades.
          AI_BATCH_SIZE:       '50'
        run: node netlify/functions/process-article.js

      - name: Corrigir artigos sem journal
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node netlify/functions/fix-missing-journals.js

      - name: Remover usuários duplicados
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node netlify/functions/fix-duplicate-users.js

      - name: Atualizar perfis comportamentais
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node netlify/functions/update-user-profile.js

# ── Job 2: Envio de Emails ────────────────────────────────────────────────────
  email:
    name: Envio de Digests
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Executa email se:
    #   A) ingest terminou (com sucesso OU falha — ainda há artigos no Firestore)
    #      exceto se foi cancelado pelo usuário.
    #   B) E o evento NÃO é push de código (push só atualiza artigos, nunca envia email).
    if: >-
      always() &&
      needs.ingest.result != 'cancelled' &&
      github.event_name != 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Disparar digests
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY:        ${{ secrets.NCBI_API_KEY }}
          UNSUBSCRIBE_SECRET:  ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL:            https://odontofeed.com
          FORCE_SEND:          ${{ github.event.inputs.force_send || 'false' }}
        run: node netlify/functions/daily-digest.js

# ── Job 3: Podcasts (áudio) — JOB PRÓPRIO com timeout dedicado ────────────────
#
# CORREÇÃO 24/07 (erro grave "sem podcast"): antes o generate-podcasts dividia o
# timeout de 30 min com o daily-digest NO MESMO JOB. Numa madrugada de API lenta
# (timeouts da Anthropic) o digest levou 20 min e o generate-podcasts foi
# CANCELADO no meio — Ortodontia ficou sem áudio. Agora os podcasts têm JOB e
# TEMPO próprios (40 min), então nunca são cortados pelo digest. O generate é
# idempotente (pula episódios já existentes), então um re-run só completa o que
# faltou.
  podcasts:
    name: Gerar Podcasts
    needs: email
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: >-
      always() &&
      needs.ingest.result != 'cancelled' &&
      needs.email.result == 'success' &&
      github.event_name != 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar podcasts (todas as especialidades da edição)
        env:
          FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:         ${{ secrets.FIREBASE_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_TTS_API_KEY:       ${{ secrets.GOOGLE_TTS_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCS_BUCKET:               ${{ secrets.GCS_BUCKET }}
        run: node netlify/functions/generate-podcasts.js

# ── Job 4: Auditoria — roda SEMPRE (mesmo se o podcast falhou) e reporta ──────
#
# Vermelho aqui = problema visível no mesmo dia (artigo cru/em inglês, sem
# resumo completo, áudio "casca vazia" ou especialidade da edição SEM podcast).
# Roda com `always()` para nunca ser pulada quando um job anterior derrapa —
# incidente 24/07: a auditoria foi SKIPPED porque o job de podcast foi cancelado.
  audit:
    name: Auditoria da Edição
    needs: [email, podcasts]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: >-
      always() &&
      needs.email.result == 'success' &&
      github.event_name != 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Auditar qualidade da edição
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/audit-edicao.js
