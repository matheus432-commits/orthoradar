name: Deploy Firestore Indexes

# Deploys indexes from firestore.indexes.json to Firestore.
# Trigger manually after adding FIREBASE_TOKEN secret (run `firebase login:ci` locally).
# Also runs automatically when firestore.indexes.json changes on main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'firestore.indexes.json'
      - 'firebase.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-indexes:
    name: Deploy Firestore Indexes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy indexes via REST API
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/deploy-indexes.js
