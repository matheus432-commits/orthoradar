name: Daily Article Ingestion

on:
  push:
    branches: [main]
    paths: ['.github/workflows/daily-ingest.yml']
  schedule:
    # 02:00 UTC — runs before daily-articles.js (10:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      skip_ai:
        description: 'Skip AI enrichment (ingest only)'
        required: false
        default: 'false'
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── Step 1: PubMed ──────────────────────────────────────────────────────
      - name: Ingest PubMed
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          NCBI_API_KEY:        ${{ secrets.NCBI_API_KEY }}
        run: node netlify/functions/ingest-pubmed.js

      # ── Step 2: Europe PMC ─────────────────────────────────────────────────
      - name: Ingest Europe PMC
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/ingest-europepmc.js

      # ── Step 3: OpenAlex ───────────────────────────────────────────────────
      - name: Ingest OpenAlex
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/ingest-openalex.js

      # ── Step 4: AI Enrichment ──────────────────────────────────────────────
      - name: Process articles with Claude Haiku
        if: ${{ inputs.skip_ai != 'true' }}
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          AI_BATCH_SIZE:       '20'
        run: node netlify/functions/process-article.js

      # ── Step 5: Update behavioral profiles ────────────────────────────────
      - name: Update user behavioral profiles
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/update-user-profile.js

      # ── Step 6: Chain to email dispatch ───────────────────────────────────
      - name: Trigger daily email dispatch
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-emails.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Email dispatch triggered."
