name: Daily Article Ingestion
# last triggered: 2026-06-01

# Ingestão isolada — use apenas para reprocessar artigos manualmente.
# O pipeline completo (ingestão + email) é gerenciado por daily-pipeline.yml.
on:
  workflow_dispatch:
    inputs:
      skip_ai:
        description: 'Skip AI enrichment (ingest only)'
        required: false
        default: 'false'
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── Step 1: PubMed ──────────────────────────────────────────────────────
      - name: Ingest PubMed
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          NCBI_API_KEY:        ${{ secrets.NCBI_API_KEY }}
        run: node netlify/functions/ingest-pubmed.js

      # ── Step 2: Europe PMC ─────────────────────────────────────────────────
      - name: Ingest Europe PMC
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/ingest-europepmc.js

      # ── Step 3: OpenAlex ───────────────────────────────────────────────────
      - name: Ingest OpenAlex
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/ingest-openalex.js

      # ── Step 4: AI Enrichment ──────────────────────────────────────────────
      - name: Process articles with Claude Haiku
        if: ${{ inputs.skip_ai != 'true' }}
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          # 3 artigos/dia × 12 especialidades = 36 + margem (reclassificação,
          # Achado da Semana, dias de ingestão fraca) → cobre todas as especialidades.
          AI_BATCH_SIZE:       '50'
        run: node netlify/functions/process-article.js

      # ── Step 5: Update behavioral profiles ────────────────────────────────
      - name: Update user behavioral profiles
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node netlify/functions/update-user-profile.js

      # Email dispatch removido: daily-emails.yml roda no schedule 10:00 UTC
      # Ingest (02:00 UTC) popula Firestore; email (10:00 UTC) consome os artigos frescos.
