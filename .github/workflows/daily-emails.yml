name: Daily Articles Email

# Envio isolado — use apenas para disparar emails manualmente sem ingestão.
# O pipeline completo (ingestão + email) é gerenciado por daily-pipeline.yml.
on:
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Ignorar anti-fadiga e forçar envio para todos'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run daily digest
        env:
          FIREBASE_PROJECT_ID:  ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:     ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY:         ${{ secrets.NCBI_API_KEY }}
          UNSUBSCRIBE_SECRET:   ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL:             https://odontofeed.com
          FORCE_SEND:           ${{ inputs.force_send || 'false' }}
        run: node netlify/functions/daily-digest.js
