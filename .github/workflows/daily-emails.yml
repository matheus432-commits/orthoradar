name: Daily Articles Email

on:
  push:
    branches: [main]
    paths: ['.github/workflows/daily-emails.yml']
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Ignorar anti-fadiga e forcar envio para todos'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run daily digest
        env:
          FIREBASE_PROJECT_ID:  ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:     ${{ secrets.FIREBASE_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY:         ${{ secrets.NCBI_API_KEY }}
          UNSUBSCRIBE_SECRET:   ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL:             https://odontofeed.com.br
          FORCE_SEND:           'true' # fix resumo artigo
        run: node netlify/functions/daily-digest.js
