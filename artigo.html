<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artigo — OdontoFeed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#0ea5e9;--accent:#06b6d4;
  --bg:#0b1120;--bg2:#111827;--bg3:#1a2336;--card:#1e2d45;
  --border:#2a3f5f;--text:#f1f5f9;--muted:#94a3b8;
  --success:#10b981;--danger:#ef4444;--radius:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(11,17,32,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(42,63,95,0.5);}
.logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.btn-back{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-back:hover{border-color:var(--primary);color:var(--primary);}
.page{max-width:800px;margin:0 auto;padding:100px 24px 60px;}
.article-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.25);color:var(--primary);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px;}
.article-date{font-size:13px;color:var(--muted);margin-bottom:12px;}
h1{font-size:clamp(1.3rem,3vw,1.9rem);font-weight:800;line-height:1.35;letter-spacing:-0.3px;margin-bottom:24px;}
.divider{height:1px;background:var(--border);margin:24px 0;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.resumo{font-size:1rem;line-height:1.8;color:#cbd5e1;}
.pubmed-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-top:32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.pubmed-box p{font-size:13px;color:var(--muted);line-height:1.5;}
.btn-pubmed{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;text-decoration:none;padding:10px 22px;border-radius:9px;font-weight:700;font-size:13px;white-space:nowrap;transition:opacity 0.2s;}
.btn-pubmed:hover{opacity:0.88;}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--bg3) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-state{text-align:center;padding:80px 24px;}
.error-state h2{font-size:1.3rem;font-weight:700;margin-bottom:8px;}
.error-state p{color:var(--muted);margin-bottom:24px;}
@media(max-width:600px){nav{padding:14px 20px;}.page{padding:80px 16px 40px;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">OdontoFeed</a>
  <a class="btn-back" href="/dashboard">← Voltar ao dashboard</a>
</nav>

<div class="page" id="pageContent">
  <div style="margin-top:40px;">
    <div class="skeleton" style="height:22px;width:120px;margin-bottom:16px;"></div>
    <div class="skeleton" style="height:14px;width:160px;margin-bottom:12px;"></div>
    <div class="skeleton" style="height:36px;width:100%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:36px;width:75%;margin-bottom:24px;"></div>
    <div class="skeleton" style="height:1px;margin-bottom:24px;"></div>
    <div class="skeleton" style="height:16px;width:100%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:16px;width:100%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:16px;width:90%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:16px;width:95%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:16px;width:70%;"></div>
  </div>
</div>

<script>
function getToken(){ return localStorage.getItem('of_token'); }
function getEmail(){ return localStorage.getItem('of_email'); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
}

function renderError(msg) {
  document.getElementById('pageContent').innerHTML = `
    <div class="error-state">
      <div style="font-size:48px;margin-bottom:16px;">📄</div>
      <h2>Artigo não encontrado</h2>
      <p>${escHtml(msg)}</p>
      <a class="btn-back" href="/dashboard">← Voltar ao dashboard</a>
    </div>`;
}

function renderArticle(art) {
  document.title = escHtml(art.titulo) + ' — OdontoFeed';
  document.getElementById('pageContent').innerHTML = `
    <div>
      <div class="article-tag">🦷 ${escHtml(art.especialidade || art.tema || 'Artigo')}</div>
      ${art.tema && art.tema !== art.especialidade ? `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Tema: ${escHtml(art.tema)}</div>` : ''}
      <div class="article-date">${formatDate(art.data)}</div>
      <h1>${escHtml(art.titulo)}</h1>
      <div class="divider"></div>
      <div class="section-label">Resumo em português</div>
      <div class="resumo">${escHtml(art.resumo)}</div>
      ${art.pubmedUrl ? `
      <div class="pubmed-box">
        <p><strong style="color:var(--text);">Artigo original no PubMed</strong><br>Acesse o artigo completo, incluindo metodologia, resultados e conclusões dos autores.</p>
        <a href="${escHtml(art.pubmedUrl)}" target="_blank" rel="noopener" class="btn-pubmed">Ler no PubMed →</a>
      </div>` : ''}
    </div>`;
}

async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const email = getEmail();
  const token = getToken();

  if (!id) { renderError('Nenhum artigo especificado.'); return; }
  if (!email || !token) {
    window.location.href = '/dashboard';
    return;
  }

  try {
    const res = await fetch('/.netlify/functions/get-article?id=' + encodeURIComponent(id) + '&email=' + encodeURIComponent(email), {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) { window.location.href = '/dashboard'; return; }
    if (!res.ok) { renderError('Este artigo não está disponível ou não pertence à sua conta.'); return; }
    const art = await res.json();
    renderArticle(art);
  } catch(e) {
    renderError('Erro de conexão. Tente novamente.');
  }
}

loadArticle();
</script>
</body>
</html>
